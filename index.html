<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rave Coffee — World Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rave-black: #1a1612;
    --rave-yellow: #F5C842;
    --rave-cream: #FAF5E4;
    --rave-navy: #1E2B4A;
    --card-pink: #E8556A;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-brand: 'Bebas Neue', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--rave-black);
    color: var(--rave-cream);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: var(--rave-black);
    border-bottom: 2px solid var(--rave-yellow);
  }
  .logo {
    font-family: var(--font-brand);
    font-size: 36px;
    color: var(--rave-yellow);
    letter-spacing: 2px;
    line-height: 1;
  }
  .logo span {
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--rave-yellow);
    border-radius: 50%;
    margin-left: 2px;
    vertical-align: middle;
    transform: translateY(-4px);
  }
  .header-right {
    display: flex; align-items: center; gap: 24px;
  }
  .coffee-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--rave-yellow);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .filter-row {
    display: flex; gap: 8px;
  }
  .filter-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid rgba(245,200,66,0.3);
    background: transparent;
    color: rgba(245,200,66,0.6);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--rave-yellow);
    color: var(--rave-black);
    border-color: var(--rave-yellow);
  }

  /* ── MAP CONTAINER ── */
  #map-wrap {
    position: fixed;
    top: 64px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  #map-svg {
    width: 100%; height: 100%;
    cursor: grab;
  }
  #map-svg:active { cursor: grabbing; }
  #map-svg path {
    fill: #2a2318;
    stroke: #3d3528;
    stroke-width: 0.5;
    transition: fill 0.2s;
  }
  #map-svg path:hover { fill: #3d3528; }

  /* ── PINS ── */
  .pin-group { cursor: pointer; }
  .pin-group:hover .pin-ring { opacity: 1; transform: scale(1.3); }
  .pin-group:hover .pin-dot { transform: scale(1.2); }
  .pin-ring {
    fill: none;
    stroke: var(--rave-yellow);
    stroke-width: 1.5;
    opacity: 0;
    transition: all 0.25s;
    transform-origin: center;
    transform-box: fill-box;
  }
  .pin-dot {
    fill: var(--rave-yellow);
    transition: transform 0.25s;
    transform-origin: center;
    transform-box: fill-box;
  }
  .pin-dot.multi { fill: #F5C842; stroke: #fff; stroke-width: 1; }
  .pin-number {
    fill: var(--rave-black);
    font-family: var(--font-mono);
    font-size: 4px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  /* ── MODAL OVERLAY ── */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,8,5,0.75);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal-overlay.open { display: flex; }

  /* ── CARD ── */
  .rave-card {
    width: 340px;
    min-height: 500px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,255,255,0.05);
    animation: cardPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    flex-shrink: 0;
  }
  @keyframes cardPop {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* card front */
  .card-front {
    padding: 22px 22px 18px;
    position: relative;
    min-height: 280px;
  }
  .card-number {
    position: absolute; top: 16px; right: 18px;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 52px;
    line-height: 1;
    color: rgba(0,0,0,0.2);
  }
  .card-no-label {
    position: absolute; top: 14px; right: 18px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(0,0,0,0.35);
  }
  .card-number-val {
    position: absolute; top: 22px; right: 18px;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 48px;
    line-height: 1;
    color: rgba(0,0,0,0.25);
  }
  .card-name-block {
    padding-right: 80px;
    margin-bottom: 20px;
  }
  .card-country {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 32px;
    line-height: 1;
    letter-spacing: 1px;
    color: var(--rave-black);
    text-transform: uppercase;
  }
  .card-coffee-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: 0.5px;
    color: rgba(0,0,0,0.7);
    text-transform: uppercase;
  }

  .card-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  .card-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.45);
    margin-bottom: 4px;
  }
  .card-roast-text {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    color: rgba(0,0,0,0.75);
    margin-bottom: 5px;
  }
  .bean-pips {
    display: flex; gap: 3px;
  }
  .bean-pip {
    width: 14px; height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    border: 1.5px solid rgba(0,0,0,0.4);
    transform: rotate(-30deg);
  }
  .bean-pip.filled { background: rgba(0,0,0,0.5); border-color: rgba(0,0,0,0.5); }

  .tastes-list {
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(0,0,0,0.8);
    line-height: 1.8;
  }

  /* brew checkboxes */
  .brew-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 10px;
    border-top: 1px solid rgba(0,0,0,0.15);
    padding-top: 14px;
    margin-top: 4px;
  }
  .brew-item {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(0,0,0,0.55);
  }
  .brew-box {
    width: 12px; height: 12px;
    border: 1.5px solid rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brew-box.checked::after {
    content: '';
    display: block;
    width: 6px; height: 5px;
    border-bottom: 2px solid rgba(0,0,0,0.7);
    border-left: 2px solid rgba(0,0,0,0.7);
    transform: rotate(-45deg) translateY(-1px);
  }

  /* card back */
  .card-back {
    background: var(--rave-navy);
  }
  .card-back-table {
    background: var(--card-pink);
    padding: 14px 18px;
  }
  .back-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    padding: 9px 0;
    align-items: start;
    gap: 8px;
  }
  .back-row:last-child { border-bottom: none; }
  .back-row-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-row-val {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(0,0,0,0.8);
    line-height: 1.5;
  }
  .back-icon {
    font-size: 13px;
    opacity: 0.6;
  }
  .roastery-notes {
    padding: 16px 18px;
    background: var(--rave-navy);
  }
  .roastery-title {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
  }
  .roastery-text {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
  }

  /* rave footer on card */
  .card-rave-footer {
    background: var(--rave-navy);
    padding: 14px 18px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-rave-logo {
    font-family: var(--font-brand);
    font-size: 28px;
    color: white;
    letter-spacing: 3px;
  }
  .card-rave-logo .reg { font-size: 12px; vertical-align: super; }
  .card-website {
    font-family: var(--font-mono);
    font-size: 8px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  /* flip control */
  .card-flip-btn {
    position: absolute; bottom: -14px; right: 0; left: 0;
    display: flex; justify-content: center;
  }
  .flip-btn {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(0,0,0,0.5);
    color: var(--rave-yellow);
    border: 1px solid var(--rave-yellow);
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .flip-btn:hover { background: var(--rave-yellow); color: var(--rave-black); }

  /* close */
  .modal-close {
    position: fixed; top: 80px; right: 24px;
    width: 36px; height: 36px;
    background: var(--rave-yellow);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--rave-black);
    font-weight: 700;
    z-index: 201;
    transition: transform 0.2s;
  }
  .modal-close:hover { transform: rotate(90deg); }

  /* multi-pin popup list */
  .pin-list {
    background: var(--rave-black);
    border: 2px solid var(--rave-yellow);
    padding: 16px;
    min-width: 220px;
    animation: cardPop 0.2s ease;
  }
  .pin-list-title {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--rave-yellow);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .pin-list-item {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    color: var(--rave-cream);
  }
  .pin-list-item:hover {
    border-left-color: var(--rave-yellow);
    color: var(--rave-yellow);
    padding-left: 14px;
  }
  .pin-list-item span {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
    display: block;
    letter-spacing: 1px;
    text-transform: none;
    margin-top: 1px;
  }

  /* zoom controls */
  .zoom-controls {
    position: fixed; bottom: 28px; right: 24px;
    display: flex; flex-direction: column; gap: 2px;
    z-index: 100;
  }
  .zoom-btn {
    width: 36px; height: 36px;
    background: var(--rave-black);
    border: 1px solid var(--rave-yellow);
    color: var(--rave-yellow);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: var(--font-mono);
  }
  .zoom-btn:hover { background: var(--rave-yellow); color: var(--rave-black); }

  /* legend */
  .legend {
    position: fixed; bottom: 28px; left: 24px;
    z-index: 100;
    background: rgba(26,22,18,0.9);
    border: 1px solid rgba(245,200,66,0.25);
    padding: 12px 16px;
  }
  .legend-title {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(245,200,66,0.5);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 5px;
    letter-spacing: 1px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--rave-yellow);
    flex-shrink: 0;
  }
  .legend-dot.multi {
    background: var(--rave-yellow);
    border: 1.5px solid white;
  }
</style>
</head>
<body>

<header>
  <div class="logo">RAVE<span></span></div>
  <div class="header-right">
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Africa">Africa</button>
      <button class="filter-btn" data-filter="Americas">Americas</button>
      <button class="filter-btn" data-filter="Asia">Asia</button>
      <button class="filter-btn" data-filter="Blend">Blends</button>
    </div>
    <div class="coffee-count" id="coffee-count">32 coffees</div>
  </div>
</header>

<div id="map-wrap">
  <svg id="map-svg" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
    <g id="countries"></g>
    <g id="pins"></g>
  </svg>
</div>

<div id="modal-overlay">
  <button class="modal-close" id="modal-close">✕</button>
  <div id="modal-content"></div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">−</button>
  <button class="zoom-btn" id="zoom-reset" style="font-size:12px;letter-spacing:0">⌂</button>
</div>

<div class="legend">
  <div class="legend-title">Map Key</div>
  <div class="legend-item"><div class="legend-dot"></div>Single origin</div>
  <div class="legend-item"><div class="legend-dot multi"></div>Multiple coffees</div>
</div>

<script src="coffees.js"></script>
<script src="map.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rave Coffee Collection — Table & Grid Dashboard</title>
  <!-- Google Fonts matching the Rave visual guidelines -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Fira+Code:wght@500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ── DESIGN SYSTEM VARIABLES ── */
    :root {
      --rave-yellow: #f5c842;
      --rave-black: #1a1612;
      --rave-navy: #121d28;
      --rave-white: #fcfbf7;
      
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'Fira Code', monospace;
    }

    /* ── GENERAL STYLES ── */
    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    body {
      background: #0d0b08;
      color: var(--rave-white);
      font-family: var(--font-body);
      overflow-x: hidden;
      padding-top: 70px; /* Header space */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; }

    /* ── BRAND HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 70px;
      background: var(--rave-yellow);
      border-top: 4px solid #000;
      border-bottom: 2px solid var(--rave-black);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      z-index: 1100;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .info-btn {
      background: none; border: none; padding: 0; margin-left: 6px;
      cursor: pointer; color: var(--rave-black);
      display: inline-flex; align-items: center; justify-content: center;
      opacity: 0.55; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .info-btn:hover {
      opacity: 1; transform: scale(1.15);
    }

    /* Top navigation button */
    .nav-view-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--rave-yellow);
      background: var(--rave-black);
      border: 1px solid var(--rave-yellow);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-view-btn:hover {
      background: var(--rave-yellow);
      color: var(--rave-black);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(245, 200, 66, 0.25);
    }

    /* ── DASHBOARD LAYOUT & CONTROLS ── */
    .dashboard-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 120px; /* space for disclaimer bottom */
      flex: 1;
    }

    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: rgba(26, 22, 18, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* Search tool */
    .search-wrap {
      flex: 1;
      min-width: 250px;
      position: relative;
    }
    .search-input {
      width: 100%;
      background: rgba(13, 11, 8, 0.85);
      border: 1px solid rgba(245, 200, 66, 0.25);
      border-radius: 4px;
      padding: 10px 16px 10px 40px;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: all 0.25s;
    }
    .search-input:focus {
      border-color: var(--rave-yellow);
      box-shadow: 0 0 10px rgba(245, 200, 66, 0.15);
    }
    .search-icon-svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    /* Continent Categories row */
    .filter-row {
      display: flex; gap: 6px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid rgba(245, 200, 66, 0.25);
      color: rgba(255, 255, 255, 0.7);
      padding: 8px 16px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn:hover {
      border-color: var(--rave-yellow);
      color: var(--rave-yellow);
    }
    .filter-btn.active {
      background: var(--rave-yellow);
      color: var(--rave-black);
      border-color: var(--rave-yellow);
      box-shadow: 0 4px 12px rgba(245, 200, 66, 0.25);
    }

    /* Switch View buttons */
    .view-switch-row {
      display: flex;
      background: rgba(13, 11, 8, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      padding: 3px;
    }
    .switch-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      padding: 8px 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      border-radius: 3px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .switch-btn:hover { color: #fff; }
    .switch-btn.active {
      background: var(--rave-yellow);
      color: var(--rave-black);
    }

    /* ── CARD GRID VIEW ── */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Mini card preview */
    .mini-card {
      background: var(--rave-navy);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s, border-color 0.25s;
    }
    .mini-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 12px 30px rgba(0,0,0,0.55);
    }

    .mini-header {
      padding: 16px 20px;
      position: relative;
    }
    .mini-num-label {
      position: absolute; top: 10px; right: 16px;
      font-family: var(--font-display);
      font-weight: 900; font-size: 32px;
      color: rgba(0,0,0,0.15);
      line-height: 1;
    }
    .mini-country {
      font-family: var(--font-display);
      font-weight: 800; font-size: 20px;
      line-height: 1.1;
      color: var(--rave-black);
    }
    .mini-name {
      font-family: var(--font-body);
      font-size: 13px; font-weight: 600;
      color: rgba(0,0,0,0.65);
      margin-top: 2px;
    }

    .mini-body {
      padding: 16px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .mini-taste-list {
      display: flex; flex-wrap: wrap; gap: 6px 8px;
    }
    .mini-taste-capsule {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255,255,255,0.06);
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    .mini-footer {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 12px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: rgba(255,255,255,0.5);
    }

    /* ── SORTABLE TABLE VIEW ── */
    .table-view-wrap {
      background: rgba(26, 22, 18, 0.3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow-x: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13px;
    }
    th {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(245, 200, 66, 0.7);
      padding: 16px 20px;
      border-bottom: 2px solid rgba(255,255,255,0.08);
      background: rgba(13, 11, 8, 0.75);
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }
    th:hover {
      background: rgba(13, 11, 8, 0.95);
      color: var(--rave-yellow);
    }
    th.sort-active {
      color: var(--rave-yellow);
    }
    th span.sort-arrow {
      margin-left: 4px;
      font-size: 9px;
      display: inline-block;
      vertical-align: middle;
    }

    td {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
      transition: background-color 0.15s;
    }
    tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .td-num {
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--rave-yellow);
    }
    .td-origin {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .td-name {
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }
    .td-roast {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .view-details-btn {
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 700;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.85);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .view-details-btn:hover {
      border-color: var(--rave-yellow);
      background: var(--rave-yellow);
      color: var(--rave-black);
    }

    /* ── TASTING CARD MODALS (Shared index.html architecture) ── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(10, 8, 5, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none; /* Controlled via JavaScript */
      justify-content: center; align-items: center;
      padding: 80px 20px 40px;
      overflow-y: auto;
    }
    #modal-overlay.open {
      display: flex;
    }
    #modal-content {
      margin: auto;
      pointer-events: auto;
    }
    .modal-close {
      position: fixed; top: 90px; right: 400px;
      width: 36px; height: 36px;
      background: var(--rave-yellow);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--rave-black); font-weight: 700;
      z-index: 2003; border-radius: 4px;
      transition: transform 0.2s, background-color 0.2s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .modal-close:hover { transform: rotate(90deg); background-color: #fff; }

    /* RAVE TASTING CARD */
    .rave-card {
      width: 360px;
      background: var(--rave-navy);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.06);
      animation: cardPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-header {
      padding: 24px 24px 20px;
      position: relative;
    }
    .card-country {
      font-family: var(--font-display);
      font-weight: 800; line-height: 1.1;
    }
    .card-coffee-name {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 28px;
      margin-top: 4px;
    }
    .card-cols {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      border-top: 1px solid rgba(0,0,0,0.1);
      margin-top: 16px; padding-top: 14px;
    }
    .card-label {
      font-family: var(--font-mono);
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 2px;
    }
    .card-roast-text {
      font-family: var(--font-mono);
      font-size: 15px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .bean-pips {
      display: flex; gap: 4px; align-items: center;
    }
    .tastes-list {
      font-family: var(--font-display);
      font-weight: 800; font-size: 15px;
      line-height: 1.25;
      letter-spacing: 0.5px;
    }
    .tastes-list div {
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 2px 0;
    }
    .tastes-list div:last-child { border-bottom: none; }

    .card-body {
      padding: 20px 24px;
      background: var(--rave-navy);
    }
    .back-row {
      display: grid; grid-template-columns: 110px 1fr; gap: 8px;
      font-size: 12px; line-height: 1.4;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 6px 0;
    }
    .back-row:last-child { border-bottom: none; }
    .back-row-label {
      font-family: var(--font-mono);
      font-weight: 700; font-size: 12px;
      color: var(--rave-yellow);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: flex; align-items: center;
    }
    .back-row-val {
      color: rgba(255,255,255,0.9);
      font-size: 13px; font-weight: 600;
    }

    .roastery-notes-section {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 16px; margin-top: 20px;
    }
    .roastery-title {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 700;
      color: var(--rave-yellow);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .roastery-text {
      font-size: 14px; line-height: 1.6;
      color: rgba(255,255,255,0.75);
    }

    /* ── MAP FOOTER DISCLAIMER ── */
    .map-disclaimer {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: rgba(26, 22, 18, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(245, 200, 66, 0.2);
      padding: 8px 16px;
      border-radius: 6px;
      color: rgba(255,255,255,0.55);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      pointer-events: auto;
      text-align: center;
    }
    .map-disclaimer a {
      color: var(--rave-yellow);
      text-decoration: underline;
      font-weight: 700;
      transition: color 0.2s;
    }
    .map-disclaimer a:hover { color: #fff; }

    /* ── RESPONSIVE RESPONSES ── */
    @media (max-width: 900px) {
      body { padding-top: 70px; }
      header {
        padding: 0 16px;
      }
      .dashboard-container {
        padding: 24px 16px 140px;
      }
      .controls-bar {
        flex-direction: column;
        align-items: stretch;
        padding: 16px;
      }
      .filter-row {
        justify-content: center;
        flex-wrap: wrap;
      }
      .filter-btn {
        flex: 1 1 calc(33% - 4px);
        text-align: center;
        padding: 8px 12px;
      }
      .view-switch-row {
        justify-content: center;
      }
      .switch-btn {
        flex: 1; justify-content: center;
      }

      /* Stack modal controls on mobile */
      #modal-overlay {
        padding: 80px 16px 40px;
      }
      .modal-close {
        position: fixed !important;
        top: 80px !important; right: 24px !important;
      }

      .map-disclaimer {
        position: fixed;
        bottom: 12px; left: 50%; transform: translateX(-50%);
        width: 90%; max-width: 380px;
        font-size: 9px; padding: 6px 10px;
        line-height: 1.3;
      }
    }

    @media (max-width: 480px) {
      .filter-btn {
        flex: 1 1 calc(50% - 4px);
      }
      .td-roast, th:nth-child(4), td:nth-child(4) {
        display: none; /* Hide roast column on tiny phones */
      }
    }
  </style>
</head>
<body>

<header>
  <div style="display: flex; align-items: center; gap: 20px;">
    <img src="https://ravecoffee.co.uk/cdn/shop/files/Rave_Coffee_Logo_New_Jun_2024_115x43_c520a1f7-4d51-46d2-b79e-829aaad17219_250x.svg?v=1718718423" alt="Rave Coffee" style="height: 44px;">
    <span style="font-family: var(--font-display); font-weight: 800; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; color: var(--rave-black); display: inline-flex; align-items: center; gap: 8px; padding-left: 16px; border-left: 2px solid rgba(26,22,18,0.25); line-height: 1.1;">
      Coffee Collection
      <button id="disclaimer-trigger" class="info-btn" title="About & Disclaimer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
        </svg>
      </button>
    </span>
  </div>
  
  <div>
    <a href="index.html" class="nav-view-btn" title="View Interactive Map">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right:4px;">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
      <span>MAP VIEW</span>
    </a>
  </div>
</header>

<div class="dashboard-container">
  <!-- Controls row -->
  <div class="controls-bar">
    <div class="search-wrap">
      <svg class="search-icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search coffees, varieties, or flavor profiles...">
    </div>

    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Africa">Africa</button>
      <button class="filter-btn" data-filter="Americas">Americas</button>
      <button class="filter-btn" data-filter="Asia">Asia</button>
      <button class="filter-btn" data-filter="Blend">Blends</button>
    </div>

    <div class="view-switch-row" id="view-switch-row">
      <button class="switch-btn active" data-view="grid">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" />
          <rect x="14" y="3" width="7" height="5" />
          <rect x="14" y="12" width="7" height="9" />
          <rect x="3" y="16" width="7" height="5" />
        </svg>
        Grid
      </button>
      <button class="switch-btn" data-view="table">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Table
      </button>
    </div>
  </div>

  <!-- Dynamic Views containers -->
  <div id="grid-view-container" class="grid-view">
    <!-- Mini cards injected dynamically -->
  </div>

  <div id="table-view-container" class="table-view-wrap" style="display: none;">
    <table>
      <thead>
        <tr>
          <th data-sort="num">N° <span class="sort-arrow" id="sort-num-arrow">▲</span></th>
          <th data-sort="country">Origin <span class="sort-arrow" id="sort-country-arrow"></span></th>
          <th data-sort="name">Coffee Name <span class="sort-arrow" id="sort-name-arrow"></span></th>
          <th data-sort="roast">Roast <span class="sort-arrow" id="sort-roast-arrow"></span></th>
          <th>Tastes Like...</th>
          <th style="width: 100px; text-align: center; cursor: default;">Actions</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Rows injected dynamically -->
      </tbody>
    </table>
  </div>
</div>

<!-- Detailed Overlay matching Map view -->
